<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abandono Escolar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

/* GENERAL */
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(120deg,#ff9a9e,#fad0c4);
}

/* CONTENIDO */
.container{
  padding:30px 15px 100px;
  text-align:center;
  color:white;
}

/* TARJETAS */
.card{
  background:white;
  color:#333;
  margin:20px auto;
  padding:20px;
  max-width:500px;
  border-radius:20px;
}

/* 💗 NAVBAR NORMAL (LAPTOP) */
.navbar{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  background:rgba(255,182,193,0.3);
  padding:10px 15px;
  border-radius:30px;
  backdrop-filter:blur(10px);
}

.navbar a{
  text-decoration:none;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  background:linear-gradient(135deg,#ff7eb3,#ff4d94);
}

/* BOTÓN MENÚ (OCULTO EN LAPTOP) */
.menu-btn{
  display:none;
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4d94;
  color:white;
  font-size:25px;
  padding:10px 15px;
  border-radius:50%;
  cursor:pointer;
  z-index:1000;
}

/* 📱 MODO CELULAR */
@media(max-width:768px){

  /* ocultar menú normal */
  .navbar{
    display:none;
    flex-direction:column;
    bottom:80px;
    right:20px;
    left:auto;
    transform:none;
  }

  /* mostrar botón */
  .menu-btn{
    display:block;
  }

  /* cuando se abre */
  .navbar.show{
    display:flex;
  }

}

</style>
</head>

<body>

<div class="container">

  <h1>MI EXPERIENCIA ESCOLAR</h1>

  <div class="card">
    <p>La escuela no siempre es fácil...</p>
  </div>

</div>

<!-- BOTÓN ☰ -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- MENÚ -->
<div class="navbar" id="menu">
  <a href="causas.html">Causas</a>
  <a href="consecuencias.html">Consecuencias</a>
  <a href="MAX.html">Upside Down</a>
  <a href="prevencion.html">Prevención</a>
  <a href="familia.html">Familia</a>
  <a href="recursos.html">Recursos</a>
</div>

<script>
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
